repos:
  # Ruff: lint + format (runs on all .py including marimo notebooks)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  # Marimo structural check (catches reactivity issues, duplicate globals)
  - repo: local
    hooks:
      - id: marimo-check
        name: marimo check
        entry: uvx marimo check
        language: system
        files: ^notebooks/.*\.py$
        pass_filenames: true
